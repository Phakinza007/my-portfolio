<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge AI</title>
  <style>
    :root {
      --bg: #050816;
      --bg-soft: #0b1024;
      --card: rgba(255,255,255,0.06);
      --card-hover: rgba(255,255,255,0.10);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --secondary: #a78bfa;
      --accent: #22c55e;
      --danger: #fb7185;
      --warning: #fbbf24;
      --border: rgba(255,255,255,0.12);
      --glow-primary: rgba(56,189,248,0.18);
      --glow-secondary: rgba(167,139,250,0.18);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, var(--glow-secondary), transparent 38%),
        radial-gradient(circle at 85% 10%, var(--glow-primary), transparent 35%),
        radial-gradient(circle at 50% 90%, rgba(34,197,94,0.07), transparent 40%),
        var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content:"";
      position:fixed; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black, transparent 65%);
      z-index:-1;
    }

    /* ── NAV ── */
    nav {
      position:sticky; top:0; z-index:50;
      display:flex; align-items:center; justify-content:space-between;
      padding: 1rem 2rem;
      background: rgba(5,8,22,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display:flex; align-items:center; gap:0.7rem;
      font-size:1.05rem; font-weight:700; letter-spacing:-0.3px;
    }

    .ai-icon {
      width:32px; height:32px; border-radius:10px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      display:flex; align-items:center; justify-content:center;
      font-size:0.9rem; box-shadow: 0 0 18px var(--glow-secondary);
    }

    .nav-count {
      font-size:0.78rem; color:var(--muted);
      background:var(--card); border:1px solid var(--border);
      padding:0.2rem 0.65rem; border-radius:20px;
    }

    /* ── LAYOUT ── */
    .layout {
      display:grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 61px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.4rem 1rem;
      display:flex; flex-direction:column; gap:0.5rem;
      background: rgba(5,8,22,0.4);
      overflow-y:auto;
    }

    .sidebar-heading {
      font-size:0.7rem; font-weight:700; letter-spacing:1.2px;
      text-transform:uppercase; color:var(--muted);
      padding: 0.3rem 0.5rem 0.6rem;
    }

    .cat-btn {
      display:flex; align-items:center; gap:0.6rem;
      padding:0.5rem 0.75rem; border-radius:var(--radius-sm);
      border:none; background:transparent; color:var(--muted);
      cursor:pointer; font-size:0.85rem; width:100%; text-align:left;
      transition:all 0.18s;
    }

    .cat-btn:hover { background:var(--card); color:var(--text); }
    .cat-btn.active { background:rgba(56,189,248,0.1); color:var(--primary); }

    .cat-dot {
      width:7px; height:7px; border-radius:50%; flex-shrink:0;
    }

    .cat-count {
      margin-left:auto; font-size:0.7rem;
      background:rgba(255,255,255,0.08); padding:0.1rem 0.45rem;
      border-radius:10px; color:var(--muted);
    }

    .sidebar-divider {
      height:1px; background:var(--border); margin:0.5rem 0;
    }

    /* ── MAIN CONTENT ── */
    .content { display:flex; flex-direction:column; overflow:hidden; }

    /* ── CHAT / ASK AI ── */
    .ask-panel {
      border-bottom:1px solid var(--border);
      padding:1.4rem 1.8rem;
      background: rgba(5,8,22,0.3);
    }

    .ask-label {
      font-size:0.75rem; font-weight:600; color:var(--secondary);
      letter-spacing:0.8px; text-transform:uppercase; margin-bottom:0.7rem;
      display:flex; align-items:center; gap:0.4rem;
    }

    .pulse {
      width:6px; height:6px; border-radius:50%;
      background:var(--secondary);
      animation:pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:0.4; transform:scale(0.7); }
    }

    .ask-row {
      display:flex; gap:0.7rem;
    }

    .ask-input {
      flex:1;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      padding:0.75rem 1rem;
      color:var(--text); font-size:0.92rem;
      outline:none; transition:border-color 0.2s, box-shadow 0.2s;
    }

    .ask-input::placeholder { color:var(--muted); }
    .ask-input:focus {
      border-color:var(--secondary);
      box-shadow:0 0 0 3px rgba(167,139,250,0.12);
    }

    .btn {
      display:inline-flex; align-items:center; gap:0.4rem;
      padding:0.6rem 1.2rem; border-radius:var(--radius-md);
      font-size:0.88rem; font-weight:600; border:none;
      cursor:pointer; transition:all 0.18s; white-space:nowrap;
    }

    .btn-ai {
      background:linear-gradient(135deg, var(--secondary), #818cf8);
      color:#fff; box-shadow:0 4px 16px rgba(167,139,250,0.28);
    }
    .btn-ai:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(167,139,250,0.42); }
    .btn-ai:active { transform:translateY(0); }

    .btn-primary {
      background:linear-gradient(135deg, var(--primary), #0ea5e9);
      color:#fff; box-shadow:0 4px 16px rgba(56,189,248,0.25);
    }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(56,189,248,0.38); }

    /* AI Answer bubble */
    .ai-answer {
      margin-top:0.9rem;
      background:rgba(167,139,250,0.08);
      border:1px solid rgba(167,139,250,0.2);
      border-radius:var(--radius-md);
      padding:1rem 1.1rem;
      font-size:0.9rem; line-height:1.65;
      display:none;
    }

    .ai-answer.show { display:block; animation:fadeIn 0.22s ease; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    .ai-answer-header {
      display:flex; align-items:center; gap:0.5rem;
      font-size:0.75rem; color:var(--secondary);
      font-weight:600; margin-bottom:0.6rem;
      text-transform:uppercase; letter-spacing:0.5px;
    }

    .answer-sources {
      margin-top:0.75rem; display:flex; gap:0.4rem; flex-wrap:wrap;
    }

    .source-chip {
      font-size:0.7rem; padding:0.18rem 0.6rem;
      background:rgba(255,255,255,0.06); border:1px solid var(--border);
      border-radius:20px; color:var(--muted); cursor:pointer;
      transition:all 0.15s;
    }
    .source-chip:hover { color:var(--primary); border-color:var(--primary); }

    /* ── KNOWLEDGE PANEL ── */
    .knowledge-panel { flex:1; padding:1.4rem 1.8rem; overflow-y:auto; }

    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.2rem; flex-wrap:wrap; gap:0.7rem;
    }

    .panel-title {
      font-size:1.1rem; font-weight:700; letter-spacing:-0.3px;
    }

    .search-box {
      display:flex; align-items:center; gap:0.5rem;
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius-md); padding:0.45rem 0.85rem;
      flex:1; max-width:300px;
    }

    .search-box svg { flex-shrink:0; color:var(--muted); }

    .search-box input {
      background:transparent; border:none; outline:none;
      color:var(--text); font-size:0.85rem; width:100%;
    }

    .search-box input::placeholder { color:var(--muted); }

    /* Grid */
    .cards-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap:0.9rem;
    }

    .knowledge-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:1.1rem 1.2rem;
      cursor:pointer; transition:all 0.2s;
      animation:slideIn 0.22s ease;
    }

    @keyframes slideIn {
      from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)}
    }

    .knowledge-card:hover {
      background:var(--card-hover); border-color:rgba(255,255,255,0.2);
      transform:translateY(-2px);
      box-shadow:0 8px 28px rgba(0,0,0,0.3);
    }

    .card-cat-dot {
      width:8px; height:8px; border-radius:50%; display:inline-block;
      margin-right:0.4rem;
    }

    .card-cat-label {
      font-size:0.7rem; font-weight:600; letter-spacing:0.5px;
      text-transform:uppercase; color:var(--muted);
    }

    .card-title {
      font-size:0.95rem; font-weight:600; margin:0.55rem 0 0.5rem;
      line-height:1.35;
    }

    .card-excerpt {
      font-size:0.8rem; color:var(--muted); line-height:1.55;
      display:-webkit-box; -webkit-line-clamp:3;
      -webkit-box-orient:vertical; overflow:hidden;
    }

    .card-footer {
      display:flex; align-items:center; justify-content:space-between;
      margin-top:0.85rem; padding-top:0.75rem; border-top:1px solid var(--border);
    }

    .card-date { font-size:0.7rem; color:var(--muted); }

    .card-actions { display:flex; gap:0.3rem; }

    .icon-btn {
      width:26px; height:26px; border-radius:6px;
      border:none; background:transparent; color:var(--muted);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; transition:all 0.15s;
    }
    .icon-btn:hover { background:rgba(255,255,255,0.08); color:var(--text); }
    .icon-btn.del:hover { background:rgba(251,113,133,0.1); color:var(--danger); }

    /* ── MODAL ── */
    .modal-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(5,8,22,0.75); backdrop-filter:blur(10px);
      display:flex; align-items:center; justify-content:center;
      padding:1rem;
      opacity:0; pointer-events:none; transition:opacity 0.22s;
    }

    .modal-overlay.show { opacity:1; pointer-events:all; }

    .modal {
      background:#0e1627; border:1px solid var(--border);
      border-radius:var(--radius-xl); padding:1.8rem;
      width:min(580px, 100%); max-height:85vh; overflow-y:auto;
      transform:translateY(12px); transition:transform 0.22s;
    }

    .modal-overlay.show .modal { transform:translateY(0); }

    .modal-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:1.2rem;
    }

    .modal-title { font-size:1.05rem; font-weight:700; }

    .modal-close {
      width:30px; height:30px; border-radius:8px;
      border:1px solid var(--border); background:transparent;
      color:var(--muted); cursor:pointer; font-size:1.1rem;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s;
    }
    .modal-close:hover { background:rgba(255,255,255,0.08); color:var(--text); }

    .form-group { margin-bottom:1rem; }

    .form-label {
      display:block; font-size:0.78rem; font-weight:600;
      color:var(--muted); margin-bottom:0.4rem; letter-spacing:0.3px;
    }

    .form-input, .form-textarea, .form-select {
      width:100%; background:rgba(255,255,255,0.06);
      border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:0.65rem 0.9rem; color:var(--text); font-size:0.9rem;
      font-family:inherit; outline:none; transition:border-color 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder, .form-textarea::placeholder { color:var(--muted); }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color:var(--primary); box-shadow:0 0 0 3px rgba(56,189,248,0.1);
    }

    .form-textarea { min-height:130px; resize:vertical; }
    .form-select option { background:#1e293b; }

    .modal-footer {
      display:flex; gap:0.7rem; justify-content:flex-end; margin-top:1.3rem;
    }

    .btn-ghost {
      background:transparent; border:1px solid var(--border);
      color:var(--muted); font-size:0.88rem; padding:0.55rem 1rem;
      border-radius:var(--radius-md); cursor:pointer; transition:all 0.18s;
    }
    .btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,0.22); }

    /* ── VIEW MODAL ── */
    .view-content {
      font-size:0.92rem; line-height:1.75; color:var(--muted);
      white-space:pre-wrap; word-break:break-word;
    }

    .view-meta {
      display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;
    }

    /* ── EMPTY ── */
    .empty-state {
      text-align:center; padding:4rem 1rem; color:var(--muted);
      grid-column:1/-1;
    }
    .empty-state .icon { font-size:3rem; margin-bottom:0.8rem; }
    .empty-state p { font-size:0.9rem; }

    /* ── CATEGORY COLORS ── */
    .cat-general  { --cc:#38bdf8; }
    .cat-tech     { --cc:#a78bfa; }
    .cat-science  { --cc:#22c55e; }
    .cat-history  { --cc:#fbbf24; }
    .cat-personal { --cc:#fb7185; }

    /* ── RESPONSIVE ── */
    @media (max-width:700px) {
      .layout { grid-template-columns:1fr; }
      .sidebar { display:none; }
      .ask-panel, .knowledge-panel { padding:1rem 1rem; }
      .cards-grid { grid-template-columns:1fr; }
      .panel-header { flex-direction:column; align-items:flex-start; }
      .search-box { max-width:100%; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <div class="ai-icon">✦</div>
    Knowledge AI
  </div>
  <span class="nav-count" id="nav-count">0 entries</span>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-heading">Categories</div>
    <button class="cat-btn active" data-cat="all" onclick="setCategory('all',this)">
      <span class="cat-dot" style="background:var(--primary)"></span>
      All Knowledge
      <span class="cat-count" id="cnt-all">0</span>
    </button>
    <button class="cat-btn" data-cat="general" onclick="setCategory('general',this)">
      <span class="cat-dot" style="background:#38bdf8"></span>
      General
      <span class="cat-count" id="cnt-general">0</span>
    </button>
    <button class="cat-btn" data-cat="tech" onclick="setCategory('tech',this)">
      <span class="cat-dot" style="background:#a78bfa"></span>
      Technology
      <span class="cat-count" id="cnt-tech">0</span>
    </button>
    <button class="cat-btn" data-cat="science" onclick="setCategory('science',this)">
      <span class="cat-dot" style="background:#22c55e"></span>
      Science
      <span class="cat-count" id="cnt-science">0</span>
    </button>
    <button class="cat-btn" data-cat="history" onclick="setCategory('history',this)">
      <span class="cat-dot" style="background:#fbbf24"></span>
      History
      <span class="cat-count" id="cnt-history">0</span>
    </button>
    <button class="cat-btn" data-cat="personal" onclick="setCategory('personal',this)">
      <span class="cat-dot" style="background:#fb7185"></span>
      Personal
      <span class="cat-count" id="cnt-personal">0</span>
    </button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-heading">Quick Stats</div>
    <div style="padding:0.3rem 0.5rem; font-size:0.82rem; color:var(--muted); line-height:2">
      <div>Total words: <strong id="stat-words" style="color:var(--text)">0</strong></div>
      <div>Last added: <strong id="stat-last" style="color:var(--text)">—</strong></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="content">
    <!-- ASK AI -->
    <div class="ask-panel">
      <div class="ask-label">
        <div class="pulse"></div>
        Ask your knowledge base
      </div>
      <div class="ask-row">
        <input type="text" class="ask-input" id="ask-input"
          placeholder="Ask anything from your saved knowledge…" autocomplete="off" />
        <button class="btn btn-ai" onclick="askAI()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Ask
        </button>
      </div>
      <div class="ai-answer" id="ai-answer">
        <div class="ai-answer-header">
          <span>✦</span> AI Answer
        </div>
        <div id="ai-answer-text"></div>
        <div class="answer-sources" id="answer-sources"></div>
      </div>
    </div>

    <!-- KNOWLEDGE LIST -->
    <div class="knowledge-panel">
      <div class="panel-header">
        <div class="panel-title" id="panel-title">All Knowledge</div>
        <div style="display:flex; gap:0.7rem; align-items:center; flex-wrap:wrap;">
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search…" oninput="render()" />
          </div>
          <button class="btn btn-primary" onclick="openAddModal()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Entry
          </button>
        </div>
      </div>

      <div class="cards-grid" id="cards-grid"></div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-label">New Knowledge Entry</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="form-title" placeholder="Give your entry a clear title" maxlength="120" />
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="form-cat">
        <option value="general">General</option>
        <option value="tech">Technology</option>
        <option value="science">Science</option>
        <option value="history">History</option>
        <option value="personal">Personal</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Content</label>
      <textarea class="form-textarea" id="form-content" placeholder="Write your knowledge here…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags (comma separated)</label>
      <input type="text" class="form-input" id="form-tags" placeholder="e.g. python, machine learning, tutorial" />
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="view-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="view-title"></div>
      <button class="modal-close" onclick="closeViewModal()">✕</button>
    </div>
    <div class="view-meta" id="view-meta"></div>
    <div class="view-content" id="view-content"></div>
  </div>
</div>

<script>
  const CAT_COLORS = {
    general:'#38bdf8', tech:'#a78bfa', science:'#22c55e',
    history:'#fbbf24', personal:'#fb7185'
  };
  const CAT_LABELS = {
    general:'General', tech:'Technology', science:'Science',
    history:'History', personal:'Personal'
  };

  let entries = JSON.parse(localStorage.getItem('knowledgeai_entries') || '[]');
  let currentCat = 'all';
  let editingId = null;

  /* ── STORAGE ── */
  function save() { localStorage.setItem('knowledgeai_entries', JSON.stringify(entries)); }

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  /* ── CATEGORY FILTER ── */
  function setCategory(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const labels = { all:'All Knowledge', ...CAT_LABELS };
    document.getElementById('panel-title').textContent = labels[cat] || cat;
    render();
  }

  /* ── MODAL ADD/EDIT ── */
  function openAddModal(id) {
    editingId = id || null;
    const modal = document.getElementById('add-modal');
    document.getElementById('modal-title-label').textContent = id ? 'Edit Entry' : 'New Knowledge Entry';
    if (id) {
      const e = entries.find(e => e.id === id);
      if (e) {
        document.getElementById('form-title').value = e.title;
        document.getElementById('form-cat').value = e.category;
        document.getElementById('form-content').value = e.content;
        document.getElementById('form-tags').value = (e.tags || []).join(', ');
      }
    } else {
      document.getElementById('form-title').value = '';
      document.getElementById('form-cat').value = 'general';
      document.getElementById('form-content').value = '';
      document.getElementById('form-tags').value = '';
    }
    modal.classList.add('show');
    setTimeout(() => document.getElementById('form-title').focus(), 120);
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.remove('show');
    editingId = null;
  }

  function saveEntry() {
    const title   = document.getElementById('form-title').value.trim();
    const content = document.getElementById('form-content').value.trim();
    if (!title) { document.getElementById('form-title').focus(); return; }
    if (!content) { document.getElementById('form-content').focus(); return; }

    const tagsRaw = document.getElementById('form-tags').value;
    const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

    if (editingId) {
      const e = entries.find(e => e.id === editingId);
      if (e) { e.title = title; e.category = document.getElementById('form-cat').value; e.content = content; e.tags = tags; }
    } else {
      entries.unshift({
        id: genId(), title,
        category: document.getElementById('form-cat').value,
        content, tags,
        createdAt: new Date().toISOString(),
      });
    }
    save(); closeAddModal(); render();
  }

  /* ── VIEW MODAL ── */
  function openViewModal(id) {
    const e = entries.find(e => e.id === id);
    if (!e) return;
    document.getElementById('view-title').textContent = e.title;
    document.getElementById('view-content').textContent = e.content;

    const meta = document.getElementById('view-meta');
    const color = CAT_COLORS[e.category] || '#38bdf8';
    const tags = (e.tags || []).map(t =>
      `<span class="source-chip">#${escHtml(t)}</span>`).join('');
    meta.innerHTML = `
      <span class="source-chip" style="color:${color};border-color:${color}30">
        ${CAT_LABELS[e.category] || e.category}
      </span>
      ${tags}
      <span class="source-chip">${formatDate(e.createdAt)}</span>
    `;
    document.getElementById('view-modal').classList.add('show');
  }

  function closeViewModal() { document.getElementById('view-modal').classList.remove('show'); }

  /* ── DELETE ── */
  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save(); render();
  }

  /* ── ASK AI ── */
  function askAI() {
    const q = document.getElementById('ask-input').value.trim().toLowerCase();
    const answerBox = document.getElementById('ai-answer');
    const answerText = document.getElementById('ai-answer-text');
    const answerSources = document.getElementById('answer-sources');

    if (!q) return;
    if (entries.length === 0) {
      answerText.textContent = 'No knowledge entries yet. Add some entries first so I can answer your questions!';
      answerSources.innerHTML = '';
      answerBox.classList.add('show');
      return;
    }

    // Score each entry by keyword match
    const words = q.split(/\W+/).filter(w => w.length > 2);
    const scored = entries.map(e => {
      const haystack = (e.title + ' ' + e.content + ' ' + (e.tags||[]).join(' ')).toLowerCase();
      const score = words.reduce((s, w) => s + (haystack.split(w).length - 1), 0);
      return { ...e, score };
    }).filter(e => e.score > 0).sort((a,b) => b.score - a.score);

    if (scored.length === 0) {
      answerText.textContent = "I couldn't find relevant entries for your question. Try adding knowledge about this topic!";
      answerSources.innerHTML = '';
    } else {
      const top = scored[0];
      const snippet = top.content.length > 320 ? top.content.slice(0, 320) + '…' : top.content;
      answerText.textContent = snippet;
      answerSources.innerHTML =
        '<span style="font-size:0.72rem;color:var(--muted);margin-right:0.3rem">Sources:</span>' +
        scored.slice(0, 4).map(e =>
          `<span class="source-chip" onclick="openViewModal('${e.id}')">${escHtml(e.title)}</span>`
        ).join('');
    }

    answerBox.classList.add('show');
  }

  /* ── RENDER ── */
  function render() {
    const grid = document.getElementById('cards-grid');
    const q = document.getElementById('search-input').value.trim().toLowerCase();

    let visible = entries;
    if (currentCat !== 'all') visible = visible.filter(e => e.category === currentCat);
    if (q) visible = visible.filter(e =>
      (e.title + e.content + (e.tags||[]).join(' ')).toLowerCase().includes(q)
    );

    // Counts
    const cats = ['general','tech','science','history','personal'];
    document.getElementById('cnt-all').textContent = entries.length;
    cats.forEach(c => {
      const el = document.getElementById('cnt-' + c);
      if (el) el.textContent = entries.filter(e => e.category === c).length;
    });

    // Nav count
    document.getElementById('nav-count').textContent =
      entries.length + (entries.length === 1 ? ' entry' : ' entries');

    // Stats
    const totalWords = entries.reduce((s,e) => s + e.content.split(/\s+/).filter(Boolean).length, 0);
    document.getElementById('stat-words').textContent = totalWords.toLocaleString();
    if (entries.length) {
      const latest = entries.reduce((a,b) => a.createdAt > b.createdAt ? a : b);
      document.getElementById('stat-last').textContent = formatDate(latest.createdAt);
    } else {
      document.getElementById('stat-last').textContent = '—';
    }

    // Empty state
    if (visible.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">✦</div>
          <p>${entries.length === 0 ? 'No knowledge yet. Click "Add Entry" to get started!' : 'No entries match your search.'}</p>
        </div>`;
      return;
    }

    grid.innerHTML = visible.map(e => {
      const color = CAT_COLORS[e.category] || '#38bdf8';
      const label = CAT_LABELS[e.category] || e.category;
      const excerpt = e.content.length > 110 ? e.content.slice(0,110) + '…' : e.content;
      const tags = (e.tags || []).slice(0,3).map(t =>
        `<span class="pill-tag" style="font-size:0.68rem;padding:0.12rem 0.5rem;background:rgba(255,255,255,0.05);border-radius:10px;color:var(--muted)">#${escHtml(t)}</span>`
      ).join('');
      return `
      <div class="knowledge-card" onclick="openViewModal('${e.id}')">
        <div>
          <span class="cat-dot card-cat-dot" style="background:${color}"></span>
          <span class="card-cat-label" style="color:${color}">${label}</span>
        </div>
        <div class="card-title">${escHtml(e.title)}</div>
        <div class="card-excerpt">${escHtml(excerpt)}</div>
        ${tags ? `<div style="display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.5rem">${tags}</div>` : ''}
        <div class="card-footer" onclick="event.stopPropagation()">
          <span class="card-date">${formatDate(e.createdAt)}</span>
          <div class="card-actions">
            <button class="icon-btn" title="Edit" onclick="openAddModal('${e.id}')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn del" title="Delete" onclick="deleteEntry('${e.id}')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  /* ── HELPERS ── */
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  /* ── KEYBOARD ── */
  document.getElementById('ask-input').addEventListener('keydown', e => { if (e.key==='Enter') askAI(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeAddModal(); closeViewModal(); }
  });

  render();
</script>
</body>
</html>
