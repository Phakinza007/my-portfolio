  <style>
    :root {
      --paper: oklch(96% 0.018 62);
      --paper-soft: oklch(91% 0.046 88);
      --ink: oklch(22% 0.035 40);
      --muted: oklch(48% 0.035 52);
      --line: oklch(80% 0.028 56);
      --cobalt: oklch(56% 0.19 256);
      --coral: oklch(68% 0.135 35);
      --surface: oklch(98% 0.012 65);
      --shadow: 0 26px 70px oklch(24% 0.04 42 / 0.16);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: "Noto Sans Thai", "Bai Jamjuree", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, var(--paper) 0%, oklch(94% 0.025 80) 46%, oklch(91% 0.04 165) 100%);
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(oklch(40% 0.05 50 / 0.07) 1px, transparent 1px),
        linear-gradient(90deg, oklch(40% 0.05 50 / 0.07) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, oklch(0% 0 0 / 0.5), transparent 76%);
    }

    main {
      position: relative;
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: clamp(24px, 5vw, 64px);
      align-items: center;
      padding: clamp(26px, 6vw, 58px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: oklch(98% 0.012 65 / 0.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .code {
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      border-radius: 8px;
      background:
        radial-gradient(circle at 30% 26%, oklch(91% 0.09 88) 0 24%, transparent 25%),
        linear-gradient(145deg, var(--cobalt), oklch(50% 0.18 285));
      color: var(--surface);
      font-family: "Bai Jamjuree", sans-serif;
      font-size: clamp(3rem, 13vw, 8rem);
      font-weight: 700;
      letter-spacing: 0;
    }

    .copy {
      display: grid;
      gap: 20px;
    }

    .eyebrow {
      width: fit-content;
      padding: 6px 10px;
      border: 1px solid oklch(67% 0.09 256 / 0.34);
      border-radius: 8px;
      background: oklch(93% 0.04 256 / 0.55);
      color: var(--cobalt);
      font: 700 0.78rem/1 "Bai Jamjuree", sans-serif;
      text-transform: uppercase;
    }

    h1 {
      max-width: 10ch;
      font-family: "Bai Jamjuree", sans-serif;
      font-size: clamp(2.4rem, 7vw, 5.7rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    p {
      max-width: 52ch;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.12rem);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 4px;
    }

    a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 8px;
      color: inherit;
      font-weight: 700;
      text-decoration: none;
      transition: transform 180ms var(--ease), box-shadow 180ms var(--ease), background 180ms var(--ease);
    }

    a.primary {
      background: var(--cobalt);
      color: var(--surface);
      box-shadow: 0 14px 30px oklch(56% 0.19 256 / 0.22);
    }

    a.secondary {
      border: 1px solid var(--line);
      background: var(--surface);
    }

    a:hover {
      transform: translateY(-2px);
    }

    a:focus-visible {
      outline: 3px solid oklch(68% 0.135 35 / 0.42);
      outline-offset: 3px;
    }

    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
      }

      .code {
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <section class="copy" aria-labelledby="missing-title">
      <div class="eyebrow">page not found</div>
      <h1 id="missing-title">ลิงก์นี้ยังไม่มีหน้า</h1>
      <p>
        โปรเจกต์อาจถูกย้ายชื่อไฟล์ หรือ URL พิมพ์ผิด กลับไปหน้า portfolio หลักเพื่อเลือกงานทั้งหมดได้เลย.
      </p>
      <div class="actions">
        <a class="primary" href="https://phakinza007.github.io/my-portfolio/">Back to portfolio</a>
        <a class="secondary" href="https://github.com/Phakinza007/my-portfolio">Open repository</a>
      </div>
    </section>
  </main>
</body>
</html>
