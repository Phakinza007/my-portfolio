<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — return to Phakin Chawanpunya's portfolio." />
  <meta name="author" content="Phakin Chawanpunya" />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#4f6ef7" />
  <link rel="canonical" href="https://phakinza007.github.io/my-portfolio/404.html" />
  <meta property="og:title" content="Page Not Found | Phakin Chawanpunya" />
  <meta property="og:description" content="The page you're looking for doesn't exist. Return to the portfolio." />
  <meta property="og:url" content="https://phakinza007.github.io/my-portfolio/404.html" />
  <meta property="og:image" content="https://phakinza007.github.io/my-portfolio/assets/social-preview.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>404 — Page Not Found | Phakin Chawanpunya</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --border:      #21262d;
      --fg:          #e6edf3;
      --muted:       #8b949e;
      --accent:      #4f6ef7;
      --accent-dark: #3b55d4;
      --r: 12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    html { background: var(--bg); color: var(--fg); font-family: var(--font); height: 100%; }

    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black, transparent);
    }

    .inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      max-width: 520px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: rgba(79,110,247,0.12);
      border: 1px solid rgba(79,110,247,0.35);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 24px;
    }

    .code {
      font-size: clamp(5rem, 22vw, 9rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #4f6ef7 0%, #818cf8 55%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.25rem, 4vw, 1.7rem);
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .lead {
      font-size: 0.97rem;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.68;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      height: 44px;
      padding: 0 22px;
      border-radius: var(--r);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 150ms, transform 150ms, border-color 150ms;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.28); color: var(--fg); background: rgba(255,255,255,0.04); }

    .divider {
      width: 1px;
      height: 1px;
      border-top: 1px solid var(--border);
      width: 56px;
      margin-bottom: 28px;
    }

    .shortcut-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 14px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 150ms, color 150ms, border-color 150ms;
    }
    .chip:hover { background: rgba(79,110,247,0.1); border-color: rgba(79,110,247,0.4); color: var(--accent); }
    .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="inner">
    <span class="badge">404 Error</span>
    <div class="code" aria-hidden="true">404</div>
    <h1>Page not found</h1>
    <p class="lead">This page doesn't exist, was moved, or the URL might be mistyped. Head back to the portfolio to find what you're looking for.</p>

    <div class="actions">
      <a class="btn btn-primary" href="index.html">Back to Portfolio</a>
      <a class="btn btn-ghost" href="resume.html">View Resume</a>
    </div>

    <div class="divider"></div>
    <p class="shortcut-label">Jump to a section</p>
    <div class="chips">
      <a class="chip" href="index.html#projects">Selected Work</a>
      <a class="chip" href="index.html#case-studies">Case Studies</a>
      <a class="chip" href="index.html#about">About</a>
      <a class="chip" href="index.html#contact">Contact</a>
      <a class="chip" href="https://github.com/Phakinza007/my-portfolio" target="_blank" rel="noopener noreferrer">GitHub Repo</a>
    </div>
  </div>
</body>
</html>
